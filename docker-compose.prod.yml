services:
  postgres:
    image: postgres:16
    container_name: relayops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: relayops
    volumes:
      - relayops_postgres_data:/var/lib/postgresql/data
    networks:
      - relayops-net

  nats:
    image: nats:latest
    container_name: relayops-nats
    restart: unless-stopped
    command: ["-js"]
    networks:
      - relayops-net

    api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: relayops-api
    restart: unless-stopped
    command: ["./relayops-api"]
    depends_on:
      - postgres
      - nats
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      APP_PORT: 8080
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/relayops?sslmode=disable
      READONLY_DATABASE_URL: postgres://relayops_readonly:${READONLY_DB_PASSWORD}@postgres:5432/relayops?sslmode=disable
      NATS_URL: nats://nats:4222
      DEMO_ENABLED: ${DEMO_ENABLED}
      DEMO_API_KEY: ${DEMO_API_KEY}
      DEMO_MAX_EVENTS: ${DEMO_MAX_EVENTS}
      DEMO_RANDOM_FAILURE: ${DEMO_RANDOM_FAILURE}
      DEMO_FAILURE_RATE: ${DEMO_FAILURE_RATE}
      DEMO_FAST_BACKOFF: ${DEMO_FAST_BACKOFF}
    networks:
      - relayops-net

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: relayops-worker
    restart: unless-stopped
    command: ["./relayops-worker"]
    depends_on:
      - postgres
      - nats
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/relayops?sslmode=disable
      NATS_URL: nats://nats:4222
      DEMO_RANDOM_FAILURE: ${DEMO_RANDOM_FAILURE}
      DEMO_FAILURE_RATE: ${DEMO_FAILURE_RATE}
      DEMO_FAST_BACKOFF: ${DEMO_FAST_BACKOFF}
    networks:
      - relayops-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
    container_name: relayops-frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - relayops-net

  migrate:
    image: migrate/migrate
    profiles: ["tools"]
    volumes:
      - ./backend/migrations:/migrations
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/relayops?sslmode=disable",
        "up"
      ]
    depends_on:
      - postgres
    networks:
      - relayops-net

  create-readonly-role:
    image: postgres:16
    profiles: ["tools"]
    depends_on:
      - postgres
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      READONLY_DB_PASSWORD: ${READONLY_DB_PASSWORD}
    command:
      [
        "sh",
        "-c",
        "psql -h postgres -U postgres -d relayops -c \"DO \\$\\$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_catalog.pg_roles WHERE rolname = 'relayops_readonly') THEN CREATE ROLE relayops_readonly LOGIN PASSWORD '${READONLY_DB_PASSWORD}'; ELSE ALTER ROLE relayops_readonly PASSWORD '${READONLY_DB_PASSWORD}'; END IF; END \\$\\$;\""
      ]
    networks:
      - relayops-net

volumes:
  relayops_postgres_data:

networks:
  relayops-net:
    driver: bridge